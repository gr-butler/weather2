# =============================================================================
#  Telegraf -> Postgres bridge for the weather2 ESP32 station.
#
#  Scrapes the device's Prometheus /metrics endpoint every 15 minutes and writes
#  ONE consolidated row per scrape into the `weather_observations` table (see
#  weather_schema.sql). This restores the Postgres history the original Go
#  weather app wrote directly, and adds humidity / rain / river that the old
#  `weather` table lacked.
#
#  ---------------------------------------------------------------------------
#  SETUP (Ubuntu)
#  ---------------------------------------------------------------------------
#  1. Install Telegraf from the InfluxData apt repo (this also installs and
#     enables the systemd unit `telegraf.service`):
#
#       curl -fsSL https://repos.influxdata.com/influxdata-archive_compat.key \
#         | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/influxdata.gpg
#       echo "deb https://repos.influxdata.com/debian stable main" \
#         | sudo tee /etc/apt/sources.list.d/influxdata.list
#       sudo apt-get update && sudo apt-get install -y telegraf
#
#  2. Create the table:
#       psql -h 192.168.3.10 -U weather -d weather -f weather_schema.sql
#
#  3. Put the DB connection string (with the password) in Telegraf's
#     EnvironmentFile so it is NOT committed to git. Edit /etc/default/telegraf
#     and add:
#
#       PG_WEATHER_CONNECTION="host=192.168.3.10 port=5432 user=weather password=YOUR_PASSWORD dbname=weather sslmode=disable"
#
#     (The original app used host=192.168.3.10 db=weather user=weather.)
#
#  4. Install this config and (re)start the service:
#       sudo cp telegraf-weather.conf /etc/telegraf/telegraf.d/weather.conf
#       sudo systemctl enable --now telegraf
#       sudo systemctl restart telegraf     # after any config change
#
#  5. Verify without waiting 15 minutes (prints the row, does not write):
#       telegraf --config /etc/telegraf/telegraf.d/weather.conf --test
#     Follow the live service logs with:
#       journalctl -u telegraf -f
# =============================================================================

[agent]
  interval = "15m"          # one observation every 15 min (matches ReportFreqMin)
  round_interval = true     # align scrapes to the top of the interval
  omit_hostname = true      # no `host` tag -> keeps the DB table clean
  precision = "1s"          # round timestamps so all fields share one instant

# --- Source: the ESP32's Prometheus exposition endpoint ----------------------
[[inputs.prometheus]]
  urls = ["http://192.168.3.200/metrics"]
  # metric_version = 2 makes each Prometheus metric name a FIELD key (all under
  # one measurement), which is what lets us assemble a single wide row below.
  metric_version = 2
  # The measurement name becomes the Postgres table name.
  name_override = "weather_observations"
  # Drop the scrape-url tag (single station) so no tag columns are created.
  tagexclude = ["url"]

# --- Rename the raw metric names to the schema's column names ----------------
[[processors.rename]]
  namepass = ["weather_observations"]
  [[processors.rename.replace]]
    field = "temperature"
    dest  = "temperature_c"
  [[processors.rename.replace]]
    field = "relative_humidity"
    dest  = "humidity_pct"
  [[processors.rename.replace]]
    field = "atmospheric_pressure"
    dest  = "pressure_hpa"
  [[processors.rename.replace]]
    field = "rain_min_rate"
    dest  = "rain_rate_mm_min"
  [[processors.rename.replace]]
    field = "rain_day"
    dest  = "rain_day_mm"
  [[processors.rename.replace]]
    field = "windspeed"
    dest  = "wind_speed_mph"
  [[processors.rename.replace]]
    field = "windgust"
    dest  = "wind_gust_mph"
  [[processors.rename.replace]]
    field = "winddirection"
    dest  = "wind_direction_deg"
  [[processors.rename.replace]]
    field = "riverlevel"
    dest  = "river_level_m"

# --- Merge the per-metric samples from one scrape into a single row ----------
# metric_version=2 emits one sparse metric per field; they share the same
# measurement, (empty) tag set and timestamp, so merge folds them into one row.
[[aggregators.merge]]
  period = "1m"
  drop_original = true      # only emit the merged row, not the raw metrics
  round_timestamp_to = "1s" # guarantee identical timestamps merge together

# --- Sink: Postgres ----------------------------------------------------------
[[outputs.postgresql]]
  # Connection string comes from the environment (see step 3) so the password
  # stays out of source control.
  connection = "${PG_WEATHER_CONNECTION}"
  # Persist only the curated weather columns; ignore operational metrics such as
  # `period` and the river_monitor_* scrape counters that /metrics also exposes.
  fieldinclude = [
    "temperature_c",
    "humidity_pct",
    "pressure_hpa",
    "rain_rate_mm_min",
    "rain_day_mm",
    "wind_speed_mph",
    "wind_gust_mph",
    "wind_direction_deg",
    "river_level_m",
  ]
