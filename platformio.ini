; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = private.ini
default_envs = esp32

; =============================================================================
;  Shared config for both ESP32 targets. The production board (env:esp32) is the
;  Olimex ESP32-POE-ISO with wired Ethernet; env:esp32dev is a WiFi-only build
;  for a bog-standard ESP32 dev board (bench testing before the PoE board lands).
;  Sensor / CAN / LED pins are identical on both so the wiring carries over.
; =============================================================================
[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_unflags =
	-std=gnu++11
build_flags =
	-std=gnu++17
	; --- ElegantOTA: use the AsyncWebServer backend (we use ESPAsyncWebServer) ---
	-D ELEGANTOTA_USE_ASYNC_WEBSERVER=1
	; --- CAN bus (TWAI) pins — Waveshare SN65HVD230 board ---
	-D TX_GPIO_NUM=5
	-D RX_GPIO_NUM=4
	; --- Rain bucket tip input ---
	-D RAIN_PIN=14
	; --- LEDs ---
	-D HEARTBEAT_LED_PIN=32
	-D RAIN_TIP_LED_PIN=33
	; --- I2C (atmospheric sensors) ---
	-D I2C_SDA_PIN=13
	-D I2C_SCL_PIN=16
	; --- River monitor (UK Environment Agency flood-monitoring station id) ---
	-D RIVER_STATION_ID=53125
	; --- Secrets (injected from private.ini [secrets]) ---
	'-DWIFI_SSID="${secrets.wifi_ssid}"'
	'-DWIFI_PASSWORD="${secrets.wifi_password}"'
	'-DMQTT_BROKER_HOST="${secrets.mqtt_host}"'
	-DMQTT_BROKER_PORT=${secrets.mqtt_port}
	'-DMQTT_USERNAME="${secrets.mqtt_user}"'
	'-DMQTT_PASSWORD="${secrets.mqtt_pass}"'
	'-DWOW_SITE_ID="${secrets.wow_site_id}"'
	'-DWOW_PIN="${secrets.wow_pin}"'
lib_deps =
	ayushsharma82/ElegantOTA@^3.1.6
	https://github.com/gr-butler/autoinc-semver
	knolleary/PubSubClient@^2.8
	adafruit/Adafruit BME280 Library@^2.2.4
	adafruit/Adafruit MCP9808 Library@^2.0.2
	bblanchon/ArduinoJson@^7.2.0
extra_scripts =
	pre:src/pre_extra_script.py

; --- Production target: Olimex ESP32-POE / ESP32-POE-ISO (wired Ethernet) ------
;   ESP32 + LAN8720 RMII + 802.3af PoE. Wired link is primary; WiFi is the
;   automatic fallback (see src/net.cpp). USE_ETHERNET enables the ETH path.
;   RMII consumes GPIO 0,17,18,19,21,22,23,25,26,27 (+ power 12); the 50 MHz PHY
;   clock is driven OUT of GPIO17 (set in src/net.cpp).
[env:esp32]
extends = common
board = esp32-poe-iso
build_flags =
	${common.build_flags}
	-D USE_ETHERNET
	-D ETH_POWER_PIN=12
	-D ETH_MDC_PIN=23
	-D ETH_MDIO_PIN=18
	; --- Static IP (wired production link): pin a fixed address so the Prometheus
	;     scrape target and MQTT clients always find the station. /20 subnet
	;     (255.255.240.0) + gateway 192.168.1.1 match the LAN; Cloudflare DNS. ---
	'-DETH_STATIC_IP="192.168.3.200"'
	'-DETH_GATEWAY="192.168.1.1"'
	'-DETH_SUBNET="255.255.240.0"'
	'-DETH_DNS1="1.1.1.1"'
	'-DETH_DNS2="1.0.0.1"'
	; Real tipping-bucket fitted: read the rain pin (0 = enabled).
	-D DISABLE_RAIN_PIN=0

; --- Bench-test target: any standard ESP32 dev board (WiFi only) ---------------
;   No Ethernet hardware, so USE_ETHERNET is omitted and src/net.cpp falls back
;   to a WiFi-only build. Everything else (sensors, CAN, MQTT/TLS, web, OTA) is
;   identical. Build/flash with:  platformio run -e esp32dev -t upload
[env:esp32dev]
extends = common
board = esp32doit-devkit-v1
build_flags =
	${common.build_flags}
	; Bench data is not real weather — build the WOW upload URL and log it, but
	; never POST it to the Met Office (see Reporting::sendToWow).
	-D WOW_DRY_RUN
	; No rain sensor on the bench — keep the rain meter fully initialised (all
	; buffer/rate logic runs) but don't attach the interrupt, so the floating
	; GPIO can't generate false tips (and an ever-growing rain_day total).
	-D DISABLE_RAIN_PIN=0

; Run with: pio test -e native
[env:native]
platform = native
build_flags =
	-std=gnu++17
	-pthread
	-I include
build_unflags =
	-std=gnu++11
; Buffer/wind logic is header-only and Arduino-independent, so don't compile
; the Arduino src/ tree (main.cpp etc.) on the host.
build_src_filter = -<*>
test_filter = test_buffer
	test_wind_math
	test_rain_math
